function initPasswordProtection() {
  const promptDiv = document.getElementById("passwordPrompt");
  const contentDiv = document.getElementById("protectedContent");
  const passwordForm = document.getElementById("passwordForm");
  const passwordInput = document.getElementById("passwordInput");
  const submitBtn = document.getElementById("submitBtn");
  const errorMsg = document.getElementById("errorMsg");
  const reencryptBtn = document.getElementById("reencryptBtn");

  if (!promptDiv || !contentDiv || !passwordForm || !passwordInput || !submitBtn) {
    console.error("Password protection elements not found");
    return;
  }

  if (promptDiv.dataset.protectedInitialized === "true") {
    return;
  }
  promptDiv.dataset.protectedInitialized = "true";

  if (!globalThis.crypto?.subtle) {
    console.error("Web Crypto API is unavailable");
    if (errorMsg) {
      errorMsg.textContent = "当前浏览器不支持解密受保护文章";
      errorMsg.classList.remove("hidden");
    }
    return;
  }

  const PASSWORD_CACHE_KEY = `article_password_${protectedConfig.articleId}`;

  function decodeBase64(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i += 1) {
      bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
  }

  function executeEmbeddedScripts(container) {
    const scripts = Array.from(container.querySelectorAll("script"));
    for (const script of scripts) {
      const nextScript = document.createElement("script");
      for (const attr of script.getAttributeNames()) {
        nextScript.setAttribute(attr, script.getAttribute(attr) ?? "");
      }
      nextScript.textContent = script.textContent;
      script.replaceWith(nextScript);
    }
  }

  async function deriveKey(password) {
    const importedKey = await crypto.subtle.importKey(
      "raw",
      new TextEncoder().encode(password),
      "PBKDF2",
      false,
      ["deriveKey"]
    );

    return crypto.subtle.deriveKey(
      {
        name: "PBKDF2",
        hash: "SHA-256",
        salt: decodeBase64(protectedConfig.salt),
        iterations: protectedConfig.iterations,
      },
      importedKey,
      {
        name: "AES-GCM",
        length: 256,
      },
      false,
      ["decrypt"]
    );
  }

  async function decryptHtml(password) {
    const key = await deriveKey(password);
    const decrypted = await crypto.subtle.decrypt(
      {
        name: "AES-GCM",
        iv: decodeBase64(protectedConfig.iv),
      },
      key,
      decodeBase64(protectedConfig.ciphertext)
    );

    return new TextDecoder().decode(decrypted);
  }

  function setLockedState() {
    contentDiv.innerHTML = "";
    contentDiv.classList.add("hidden");
    promptDiv.classList.remove("hidden");
    requestAnimationFrame(() => passwordInput.focus());
  }

  async function revealContent(password, rememberPassword) {
    const html = await decryptHtml(password);
    contentDiv.innerHTML = html;
    executeEmbeddedScripts(contentDiv);
    promptDiv.classList.add("hidden");
    contentDiv.classList.remove("hidden");
    if (errorMsg) errorMsg.classList.add("hidden");

    if (rememberPassword) {
      sessionStorage.setItem(PASSWORD_CACHE_KEY, password);
    }

    requestAnimationFrame(() => {
      globalThis.__breezeInitProtectedArticle?.();
    });
  }

  async function tryUnlock(password, rememberPassword, showError) {
    try {
      await revealContent(password, rememberPassword);
      return true;
    } catch (error) {
      console.error("Failed to decrypt protected post:", error);
      setLockedState();
      if (showError && errorMsg) {
        errorMsg.textContent = "密码错误，请重试";
        errorMsg.classList.remove("hidden");
      }
      return false;
    }
  }

  async function handleUnlock() {
    const inputPassword = passwordInput.value;
    if (!inputPassword) return;

    const unlocked = await tryUnlock(inputPassword, true, true);
    if (!unlocked) {
      passwordInput.value = "";
      passwordInput.focus();
    }
  }

  passwordForm.addEventListener("submit", (event) => {
    event.preventDefault();
    void handleUnlock();
  });

  if (reencryptBtn) {
    reencryptBtn.addEventListener("click", () => {
      sessionStorage.removeItem(PASSWORD_CACHE_KEY);
      localStorage.removeItem(`article_unlocked_${protectedConfig.articleId}`);
      passwordInput.value = "";
      if (errorMsg) errorMsg.classList.add("hidden");
      setLockedState();
      passwordInput.focus();
    });
  }

  const cachedPassword = sessionStorage.getItem(PASSWORD_CACHE_KEY);
  if (cachedPassword) {
    void tryUnlock(cachedPassword, false, false).then((unlocked) => {
      if (!unlocked) {
        sessionStorage.removeItem(PASSWORD_CACHE_KEY);
        passwordInput.focus();
      }
    });
    return;
  }

  setLockedState();
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initPasswordProtection, {
    once: true,
  });
} else {
  initPasswordProtection();
}

  function applyTheme() {
    const theme = (() => {
      const localStorageTheme = localStorage?.getItem("theme") ?? "";
      if (["dark", "light"].includes(localStorageTheme)) {
        return localStorageTheme;
      }
      if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        return "dark";
      }
      return "light";
    })();

    if (theme === "light") {
      document.documentElement.classList.remove("dark");
    } else {
      document.documentElement.classList.add("dark");
    }

    window.localStorage.setItem("theme", theme || "dark");
  }

  function attachThemeToggleListeners() {
    const handleToggleClick = () => {
      const element = document.documentElement;
      element.classList.toggle("dark");

      const isDark = element.classList.contains("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
    };

    // 获取所有 theme-toggle 按钮并移除旧的监听器
    document.querySelectorAll("#theme-toggle").forEach((button) => {
      // 克隆节点以移除所有旧的事件监听器
      const newButton = button.cloneNode(true);
      button.parentNode.replaceChild(newButton, button);

      // 添加新的事件监听器
      newButton.addEventListener("click", handleToggleClick);
    });
  }

  function initThemeToggle() {
    applyTheme();
    attachThemeToggleListeners();
  }

  // 页面加载时初始化
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initThemeToggle);
  } else {
    initThemeToggle();
  }

  // 页面切换时只重新应用主题和监听器
  document.addEventListener("astro:after-swap", initThemeToggle);
</script> </div> </div> </aside> </div>  <script defer></script> </body></html> <script type="module" src="/_astro/ArticleLayout.astro_astro_type_script_index_0_lang.B4uSMUoA.js"></script>
